<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Teacher Andrew</title>
    <meta name="description" content="Reset your Teacher Andrew Geography Tutoring password.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="booking-page bg-light">

    <!-- Navigation -->
    <header class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <i class="ph ph-globe-hemisphere-west"></i>
                Teacher Andrew
            </a>
            <nav class="nav-links">
                <a href="index.html#services">Services</a>
                <a href="index.html#reviews">Reviews</a>
                <a href="index.html#about">About Me</a>
                <a href="blog.html">Blog</a>
                <a href="booking.html" style="font-weight: 600; color: var(--primary-color);">Booking Portal</a>
                <a href="index.html#contact" class="btn btn-primary">Contact</a>
            </nav>
            <button class="mobile-menu-btn" aria-label="Toggle menu">
                <i class="ph ph-list"></i>
            </button>
        </div>
    </header>

    <main class="booking-main" style="min-height: calc(100vh - 200px);">
        <div class="booking-container" style="max-width: 500px;">
            <div class="auth-box">
                <div class="auth-header">
                    <h2><i class="ph ph-lock-key"></i> Reset Your Password</h2>
                    <p>Enter your new password below to regain access to your account.</p>
                </div>

                <form id="reset-password-form" class="booking-form" style="box-shadow: none; padding: 0;">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" placeholder="••••••••" required>
                    </div>

                    <p class="form-status" id="reset-status"
                        style="margin-bottom: 1rem; color: #dc2626; text-align: center;"></p>
                    <button type="submit" class="btn btn-primary btn-full" id="save-new-password-btn">Save New
                        Password</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-logo">
                <i class="ph ph-globe-hemisphere-west"></i>
                <span>Teacher Andrew</span>
            </div>
            <div class="footer-links" style="margin-top: 0.5rem; text-align: center;">
                <a href="policies.html"
                    style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.9rem; transition: color 0.3s;"
                    onmouseover="this.style.color='#fff'"
                    onmouseout="this.style.color='rgba(255,255,255,0.7)'">Policies</a>
            </div>
            <p style="margin-top: 0.5rem;">&copy; 2024 Teacher Andrew. All rights reserved.</p>
        </div>
    </footer>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('reset-password-form');
            const newPasswordInput = document.getElementById('newPassword');
            const statusMsg = document.getElementById('reset-status');
            const submitBtn = document.getElementById('save-new-password-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const newPassword = newPasswordInput.value;
                if (!newPassword || newPassword.length < 6) {
                    statusMsg.textContent = "Password must be at least 6 characters.";
                    return;
                }

                submitBtn.textContent = "Saving...";
                submitBtn.disabled = true;

                // Call Supabase to update the user password
                // Note: The user is only authorized to do this if they reached this page via the email link
                const { data, error } = await supabase.auth.updateUser({
                    password: newPassword
                });

                submitBtn.textContent = "Save New Password";
                submitBtn.disabled = false;

                if (error) {
                    statusMsg.style.color = "#dc2626";
                    statusMsg.textContent = error.message;
                } else {
                    statusMsg.style.color = "#16a34a";
                    statusMsg.textContent = "Password updated successfully! Redirecting to login...";

                    // Redirect to login page after a short delay
                    setTimeout(() => {
                        window.location.href = 'booking.html';
                    }, 2000);
                }
            });
        });
    </script>
</body>

</html>
